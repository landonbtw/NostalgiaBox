# =============================================================================
# NostalgiaBox configuration
# =============================================================================
# Copy this file to `config.yaml` (or /etc/nostalgiabox/config.yaml) and edit it
# to match the show folders on your SD card. Validate it any time with:
#
#     nostalgiabox --check
#
# There are two ways to define channels. Pick ONE.

# -----------------------------------------------------------------------------
# OPTION A (easiest): auto-discover channels from a media folder.
# -----------------------------------------------------------------------------
# Point `media_root` at a folder; every sub-folder becomes a channel, named
# after the folder and numbered sequentially. Just drop show folders in and go:
#
#   /media/nostalgiabox/
#     ├── Dragon Tales/          -> channel 2 "Dragon Tales"
#     ├── Arthur/                -> channel 3 "Arthur"
#     └── Winnie the Pooh/       -> channel 4 "Winnie The Pooh"
#
# media_root: /media/nostalgiabox
# first_channel_number: 2      # what the first discovered channel is numbered

# -----------------------------------------------------------------------------
# OPTION B (explicit): list channels yourself for full control of numbers/names.
# -----------------------------------------------------------------------------
channels:
  - number: 2
    name: "Dragon Tales"
    path: /media/nostalgiabox/dragon-tales
  - number: 3
    name: "Arthur"
    path: /media/nostalgiabox/arthur
    # Leave out episodes you don't want on this channel:
    exclude_seasons: ["6-25"]      # drop seasons 6 through 25 (detected from
                                   #   names like S06E01, "Season 6", 6x01)
    exclude: ["*special*"]         # drop any file/folder whose path matches
  - number: 4
    name: "The Magic School Bus"
    path: /media/nostalgiabox/magic-school-bus
  - number: 5
    name: "Bear in the Big Blue House"
    path: /media/nostalgiabox/bear-in-the-big-blue-house
  - number: 6
    name: "Winnie the Pooh"
    path: /media/nostalgiabox/winnie-the-pooh
  - number: 7
    name: "The Berenstain Bears"
    path: /media/nostalgiabox/berenstain-bears
  - number: 8
    name: "Mister Rogers' Neighborhood"
    path: /media/nostalgiabox/mister-rogers

# -----------------------------------------------------------------------------
# How a channel behaves when you tune into it.
#   random    - start a fresh random episode (the classic "flip and a show
#               starts"); episodes keep rolling on shuffle after that.  [default]
#   resume    - pick up where you left off on that channel last time.
#   broadcast - the channel runs like a real always-on station: it advances in
#               real time even while you're watching something else, so you tune
#               in partway through whatever "would" be airing. (Needs ffprobe.)
# -----------------------------------------------------------------------------
tune_in: random

start_channel: 2          # which channel the box powers on to

# --- The "feel" of the TV ----------------------------------------------------
# Shows keep their own aspect ratio (4:3 is pillar-boxed, 16:9 fills the screen)
# and get the CRT curve/rounding. Set force_4_3:true to instead letterbox every
# show into a single 4:3 frame.
force_4_3: false

# Start each episode a random number of seconds in, between these two values, so
# channel switches land at varied points in the show (skips the black leader/
# intro too). Use a single number for a fixed offset, e.g. `start_offset: 5`.
start_offset: [6, 10]

# Channel-change effect: "none" (cut straight over, default), "glitch" (brief
# digital corruption), or "static" (analog snow).
transition: none
transition_duration: 0.4  # how long the effect shows (if not "none")
channel_bug_seconds: 4    # how long the channel banner lingers
osd_duration: 2           # how long the volume bar / messages linger

# --- On-screen display look (the green digital readouts) ---------------------
ui:
  font: "VT323"           # bundled retro terminal font (installed by install.sh)
  color: "#4DFF5A"        # phosphor green for CH banner, volume bar, messages
  dim_color: "#123B18"    # (reserved) colour for unlit elements
  glow: true              # soft CRT-style glow around the text

# --- CRT picture effect (for 4:3 shows on a flat TV) -------------------------
# Bends the picture like a tube TV: a gentle bulge, rounded corners, a vignette
# and faint scanlines. Set enabled:false if your Pi struggles or you dislike it.
crt:
  enabled: true
  curvature: 0.12         # 0 = flat, ~0.2 = strongly bulged
  corner_radius: 0.065    # how rounded the corners are
  vignette: 0.25          # edge darkening (0-1)
  scanlines: true
  scanline_intensity: 0.12

# --- Audio -------------------------------------------------------------------
initial_volume: 70        # 0-100
volume_step: 5            # how much each volume press changes it

# --- Playback ----------------------------------------------------------------
scan_recursive: true      # also look inside season sub-folders for episodes
# video_extensions: [".mp4", ".mkv", ".avi", ".m4v"]   # override if needed
# shuffle_seed: 1234       # set for a repeatable shuffle order (mostly for tests)

# --- Remote control input ----------------------------------------------------
# All backends are auto-detected; anything unavailable is skipped, so these are
# only needed to turn things off or fine-tune device selection.
input:
  keyboard: true          # USB/IR remotes & keyboards (via Linux evdev)
  cec: true               # the TV's own remote over HDMI-CEC (needs cec-utils)
  stdin: false            # developer keyboard over the terminal
  # keyboard_name_filter: "remote"   # only listen to devices whose name matches
  # keyboard_devices: ["/dev/input/event0"]  # or pin exact devices
  # keyboard_grab: false             # true = stop keystrokes leaking to console

  # Map specific keys to actions (handy for odd remotes). Find a button's key
  # name with `sudo evtest`. Actions: channel_up, channel_down, volume_up,
  # volume_down, mute, enter, info, last_channel, power, quit, digit_0..digit_9,
  # or none (to unbind). Example for a Logitech R400 presenter. NOTE: its
  # play-screen button sends Escape (the quit key!), so remap KEY_ESC too or it
  # will shut the box off.
  # key_overrides:
  #   KEY_PAGEUP: channel_down    # left  (<) arrow
  #   KEY_PAGEDOWN: channel_up    # right (>) arrow
  #   KEY_ESC: volume_down        # play-screen button (sends Esc)
  #   KEY_F5: volume_down         #   ...and sometimes F5 - map both
  #   KEY_DOT: volume_up          # blank-screen button
  #   KEY_B: volume_up            #   ...blank button alt code - map both
