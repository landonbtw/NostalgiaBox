# NostalgiaBox - live configuration for the box.
# This file IS tracked in git so updates flow via `git pull` + a restart.
# Validate after any change with: nostalgiabox --check

channels:
  - number: 2
    name: "Dragon Tales"
    path: /media/nostalgiabox/dragon-tales
  - number: 3
    name: "Arthur"
    path: /media/nostalgiabox/arthur
    exclude_seasons: ["6-25"]      # only air seasons 1-5
    exclude: ["*special*"]         # skip the specials
  - number: 4
    name: "The Magic School Bus"
    path: /media/nostalgiabox/magic-school-bus
  - number: 5
    name: "Bear in the Big Blue House"
    path: /media/nostalgiabox/bear-in-the-big-blue-house
  - number: 6
    name: "Winnie the Pooh"
    path: /media/nostalgiabox/winnie-the-pooh
  - number: 7
    name: "The Berenstain Bears"
    path: /media/nostalgiabox/berenstain-bears
  - number: 8
    name: "Mister Rogers' Neighborhood"
    path: /media/nostalgiabox/mister-rogers

tune_in: random
start_channel: 2
start_offset: [6, 10]     # begin each show a random 6-10 seconds in
transition: none          # no glitch/static on channel change
bridge_seconds: 0.8       # keep the current show playing while the next loads,
                          #   then cut over (no frozen frame on channel change)

initial_volume: 70
volume_step: 5
# Send audio out HDMI (not the 3.5mm jack). If there's no sound, run
#   nostalgiabox --list-audio
# and set this to the HDMI device it prints (HDMI1 uses vc4hdmi1).
audio_device: "alsa/hdmi:CARD=vc4hdmi0,DEV=0"

input:
  keyboard: true
  cec: true
  # Logitech R400 presenter (temporary until the FLIRC arrives).
  key_overrides:
    KEY_PAGEUP: channel_down     # left  (<) arrow
    KEY_PAGEDOWN: channel_up     # right (>) arrow
    KEY_ESC: volume_down         # play-screen button (it sends Esc)
    KEY_F5: volume_down          #   same button, alternate code
    KEY_DOT: volume_up           # blank-screen button
    KEY_B: volume_up             #   blank button, alternate code
